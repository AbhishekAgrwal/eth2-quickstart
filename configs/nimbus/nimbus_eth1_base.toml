# Nimbus-eth1 Base Configuration File
# Current as of Nimbus-eth1 nightly — rpc-enabled/ws-enabled/engine-api-enabled removed (deprecated in NimbusConf)

# Network settings
# Nimbus-eth1 expects network as an array in config-file mode.
network = ["mainnet"]
tcp-port = 30303
udp-port = 30303

# JSON-RPC settings (rpc-port/rpc-address in custom config)
# rpc-enabled deprecated — presence of rpc-port enables RPC

# WebSocket settings (ws-port/ws-address in custom config)
# ws-enabled deprecated

# Engine API (engine-api-port/engine-api-address/jwt-secret in custom config)
# engine-api-enabled deprecated

# miner-enabled deprecated in NimbusConf (mining disabled by default for staking)

# Logging
log-level = "INFO"
