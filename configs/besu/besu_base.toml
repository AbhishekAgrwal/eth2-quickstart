# Besu Base Configuration File
# Current as of Besu 26.x — BONSAI + SNAP are default

# Network settings
network="mainnet"
p2p-port=30303
p2p-host="127.0.0.1"
discovery-enabled=true
max-peers=50

# Data storage (BONSAI default since 24.3; Forest deprecated)
data-storage-format="BONSAI"

# JSON-RPC settings
rpc-http-enabled=true
rpc-http-host="$LH"
rpc-http-cors-origins=["*"]
rpc-http-api=["ADMIN","ETH","NET","WEB3","ENGINE"]

# WebSocket settings
rpc-ws-enabled=true
rpc-ws-host="$LH"
rpc-ws-api=["WEB3","ETH","NET","ENGINE"]

# Engine API settings (for consensus client communication)
engine-rpc-enabled=true
engine-host-allowlist=["localhost","$LH"]

# Sync settings
sync-mode="SNAP"
fast-sync-min-peers=5

# Metrics and monitoring
metrics-enabled=true
metrics-host="$LH"
metrics-port=6060

# Logging
logging="INFO"
